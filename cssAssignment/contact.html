<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <div class="container">
        <div class="content">
        <h1>Contact Us</h1>
        <form action="">
           <div class="names">
            <div class ="firstName">
                <label for="first">First Name *</label><br>
                <input type="text" name="firstName" id="first" required>
            </div>

           <div class="lastname">
            <label for="last">Last Name *</label><br>
            <input type="text" name="lastName" id="last" required>
           </div>
            </div>
            <br>
            <label for="email">Email Address *</label><br>
            <input type="email" name="email" id="email" required><br><br>

            <label for="query">Query Type *</label><br>

            <div class="queryType">
                <div class="generl">
                <input type="radio" name="queryType" id="general">
                <label for="general">General Enquiry </label>
                </div>

                <div class="supprt">
                 <input type="radio" name="queryType" id="support">
                <label for="support">Support Request</label>
            </div>
            </div>
            <br>
            <label for="message">Message *</label><br>
            <textarea name="message" name="message" id="textArea" required></textarea><br><br>

            <input type="checkbox" name="" id="" required>
            <label for="">I consent to being contacted by the team *</label>

            <br><br>

            <input type="submit" id="btn" value="Submit">
        </form>
        </div>

    </div>
</body>
</html>
